name: example
on:
  push:
    branches:
      - "master"
      - "main"
  pull_request:
  workflow_dispatch:
    inputs:
      wait-for-inspection:
        description: "Wait 5 minutes after tests for manual inspection of the preview"
        type: boolean
        default: false

jobs:
  cypress-preview:
    runs-on: nscloud
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create a k8s cluster with Namespace
        id: create-cluster
        uses: namespacelabs/nscloud-cluster-action@v0

      - name: Deploy NGINX
        run: |
          kubectl run nginx --image=nginx
          kubectl expose pod nginx --type=LoadBalancer --port=80

      - name: Wait for NGINX to be ready
        run: |
          kubectl wait --for=condition=Ready pod/nginx --timeout=60s
          kubectl get pods -o wide
          kubectl get svc nginx

      - name: Expose application
        id: expose-cluster
        uses: namespacelabs/nscloud-expose-kubernetes-action@v0
        with:
          instance-id: ${{ steps.create-cluster.outputs.instance-id }}
          namespace: default
          service: nginx

      - name: Cypress tests
        uses: cypress-io/github-action@v6
        with:
          working-directory: example/withauth
          config: baseUrl=${{ steps.expose-cluster.outputs.preview-url }}
          env: token=${{ steps.expose-cluster.outputs.access-token }}

      - name: Wait for manual inspection
        if: ${{ inputs.wait-for-inspection == true }}
        run: |
          echo "Preview URL: ${{ steps.expose-cluster.outputs.preview-url }}"
          echo "Waiting 5 minutes for manual inspection..."
          sleep 300
